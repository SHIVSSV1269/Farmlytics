<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Farmlytics - AI Farming Assistant</title>
    <meta name="description" content="AI-powered farming assistant: crop advisory, pest detection, weather alerts and market prices." />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; width: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f0fdf4;
        /* Center the app in a phone-sized frame on desktop */
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #1a1a2e;
      }
      #root {
        width: 100%;
        max-width: 430px;
        height: 100vh;
        max-height: 930px;
        overflow: hidden;
        position: relative;
        background: #f0fdf4;
        box-shadow: 0 0 80px rgba(0,0,0,0.5);
        border-radius: 40px;
        display: flex;
        flex-direction: column;
      }
      @media (max-width: 480px) {
        body { background: #f0fdf4; align-items: flex-start; }
        #root { max-width: 100%; max-height: 100%; border-radius: 0; box-shadow: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
